<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d1b6e"/>
      <stop offset="45%"  stop-color="#1a4fba"/>
      <stop offset="100%" stop-color="#26c5da"/>
    </linearGradient>

    <!-- Weave masks: vertical ellipse in front at left/right zones -->
    <mask id="v-front">
      <rect width="100" height="100" fill="black"/>
      <rect x="0"  y="32" width="31" height="36" fill="white"/>
      <rect x="69" y="32" width="31" height="36" fill="white"/>
    </mask>

    <!-- Weave masks: horizontal ellipse in front at top/bottom zones -->
    <mask id="h-front">
      <rect width="100" height="100" fill="black"/>
      <rect x="32" y="0"  width="36" height="31" fill="white"/>
      <rect x="32" y="69" width="36" height="31" fill="white"/>
    </mask>
  </defs>

  <!-- Layer 1: full vertical ellipse (back) -->
  <ellipse cx="50" cy="50" rx="20" ry="37" stroke="url(#g)" stroke-width="8.5"/>

  <!-- Layer 2: full horizontal ellipse — covers vertical in the middle -->
  <ellipse cx="50" cy="50" rx="37" ry="20" stroke="url(#g)" stroke-width="8.5"/>

  <!-- Layer 3: vertical ellipse at left/right zones (goes in front of horizontal) -->
  <ellipse cx="50" cy="50" rx="20" ry="37" stroke="url(#g)" stroke-width="8.5" mask="url(#v-front)"/>

  <!-- Layer 4: horizontal ellipse at top/bottom zones (stays in front of vertical) -->
  <ellipse cx="50" cy="50" rx="37" ry="20" stroke="url(#g)" stroke-width="8.5" mask="url(#h-front)"/>
</svg>
